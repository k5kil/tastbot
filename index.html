<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ملفك الشخصي</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0c10;
      --surface:   #111318;
      --border:    #1e2330;
      --accent:    #4f8ef7;
      --accent2:   #7c3aed;
      --gold:      #f5c842;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --glow:      0 0 40px rgba(79,142,247,.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* خلفية متحركة */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(79,142,247,.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(124,58,237,.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* شبكة خلفية */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,142,247,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 24px 20px;
    }

    /* شاشة التحميل */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeIn .4s ease;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    .loading-text {
      color: var(--muted);
      font-size: 14px;
      font-weight: 300;
      letter-spacing: .5px;
    }

    /* البطاقة الرئيسية */
    #profile {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* شارة الجزء العلوي */
    .hero-badge {
      background: linear-gradient(135deg, rgba(79,142,247,.15), rgba(124,58,237,.15));
      border: 1px solid rgba(79,142,247,.3);
      border-radius: 20px 20px 0 0;
      padding: 10px 22px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
    }

    .card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 24px 24px;
      padding: 36px 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      box-shadow: var(--glow), 0 24px 60px rgba(0,0,0,.5);
    }

    /* الصورة */
    .avatar-wrap {
      position: relative;
    }

    .avatar-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      background: conic-gradient(var(--accent), var(--accent2), var(--accent));
      animation: rotatering 3s linear infinite;
      z-index: 0;
    }

    .avatar-ring-inner {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: var(--surface);
      z-index: 1;
    }

    .avatar {
      position: relative;
      z-index: 2;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    .avatar-placeholder {
      position: relative;
      z-index: 2;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: 900;
      color: #fff;
    }

    /* المعلومات */
    .info {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .user-name {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.3px;
    }

    .username-tag {
      font-size: 14px;
      font-weight: 400;
      color: var(--accent);
      background: rgba(79,142,247,.1);
      padding: 3px 12px;
      border-radius: 20px;
      border: 1px solid rgba(79,142,247,.2);
    }

    /* شرائح المعلومات */
    .stats {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 18px;
      transition: border-color .2s, background .2s;
    }

    .stat-row:hover {
      background: rgba(79,142,247,.06);
      border-color: rgba(79,142,247,.25);
    }

    .stat-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .icon-blue  { background: rgba(79,142,247,.15); }
    .icon-purple{ background: rgba(124,58,237,.15); }
    .icon-gold  { background: rgba(245,200,66,.12); }

    .stat-content {
      flex: 1;
      min-width: 0;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 2px;
      letter-spacing: .3px;
    }

    .stat-value {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      direction: ltr;
      text-align: right;
    }

    /* قسم الهاتف */
    .phone-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .phone-btn {
      width: 100%;
      padding: 13px;
      border: 1px solid rgba(34,197,94,.35);
      border-radius: 14px;
      background: rgba(34,197,94,.08);
      color: #22c55e;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .15s, border-color .2s;
      letter-spacing: .3px;
    }

    .phone-btn:hover {
      background: rgba(34,197,94,.14);
      border-color: rgba(34,197,94,.55);
    }

    .phone-btn:active { transform: scale(.98); }

    .phone-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .icon-green { background: rgba(34,197,94,.15); }

    .phone-row {
      animation: slideUp .4s cubic-bezier(.16,1,.3,1) forwards;
    }

    .verified-badge {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #22c55e;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 10px rgba(34,197,94,.4);
    }

    .phone-cancelled {
      font-size: 12px;
      color: #ef4444;
      text-align: center;
      padding: 6px 0;
      animation: fadeIn .3s ease;
    }

    /* زر الإغلاق */
    .close-btn {
      margin-top: 8px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .3px;
      transition: opacity .2s, transform .15s;
      box-shadow: 0 4px 20px rgba(79,142,247,.3);
    }

    .close-btn:active { transform: scale(.98); opacity: .9; }

    /* خط زخرفي */
    .divider {
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
    }

    /* الإحصائيات التحقق */
    .verified-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .verified-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34,197,94,.6);
      animation: pulse 2s ease infinite;
    }

    /* الرسوم المتحركة */
    @keyframes spin      { to { transform: rotate(360deg); } }
    @keyframes rotatering{ to { transform: rotate(360deg); } }
    @keyframes fadeIn    { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp   { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse     { 0%,100% { opacity: 1; } 50% { opacity: .5; } }

    .animate-in {
      animation: slideUp .5s cubic-bezier(.16,1,.3,1) forwards;
    }

    .delay-1 { animation-delay: .05s; opacity: 0; }
    .delay-2 { animation-delay: .10s; opacity: 0; }
    .delay-3 { animation-delay: .15s; opacity: 0; }
    .delay-4 { animation-delay: .20s; opacity: 0; }
    .delay-5 { animation-delay: .25s; opacity: 0; }
  </style>
</head>
<body>
<div class="container">

  <!-- شاشة التحميل -->
  <div id="loading">
    <div class="spinner"></div>
    <span class="loading-text">جاري تحميل بياناتك...</span>
  </div>

  <!-- البطاقة الشخصية -->
  <div id="profile">
    <div class="hero-badge animate-in delay-1">TELEGRAM PROFILE</div>
    <div class="card">

      <!-- الصورة -->
      <div class="avatar-wrap animate-in delay-2" id="avatarWrap">
        <div class="avatar-ring"></div>
        <div class="avatar-ring-inner"></div>
        <div class="avatar-placeholder" id="avatarPlaceholder">?</div>
      </div>

      <!-- الاسم -->
      <div class="info animate-in delay-2">
        <div class="user-name" id="userName">—</div>
        <span class="username-tag" id="userHandle">@username</span>
        <div class="verified-row">
          <div class="verified-dot"></div>
          <span>مستخدم نشط على تيليجرام</span>
        </div>
      </div>

      <div class="divider animate-in delay-3"></div>

      <!-- تفاصيل الحساب -->
      <div class="stats animate-in delay-3">

        <div class="stat-row">
          <div class="stat-icon icon-blue">👤</div>
          <div class="stat-content">
            <div class="stat-label">الاسم الكامل</div>
            <div class="stat-value" id="fullName">—</div>
          </div>
        </div>

        <div class="stat-row">
          <div class="stat-icon icon-purple">🆔</div>
          <div class="stat-content">
            <div class="stat-label">معرّف الحساب</div>
            <div class="stat-value" id="userId">—</div>
          </div>
        </div>

        <div class="stat-row">
          <div class="stat-icon icon-gold">🌐</div>
          <div class="stat-content">
            <div class="stat-label">لغة الواجهة</div>
            <div class="stat-value" id="userLang">—</div>
          </div>
        </div>

      </div>

      <!-- زر طلب رقم الهاتف -->
      <div class="phone-section animate-in delay-5" id="phoneSection">
        <button class="phone-btn" id="phoneBtn" onclick="requestPhone()">
          📱 مشاركة رقم الهاتف
        </button>
        <div class="stat-row phone-row" id="phoneRow" style="display:none; width:100%;">
          <div class="stat-icon icon-green">📞</div>
          <div class="stat-content">
            <div class="stat-label">رقم الهاتف</div>
            <div class="stat-value" id="phoneValue">—</div>
          </div>
          <div class="verified-badge">✓</div>
        </div>
      </div>

      <!-- زر الإغلاق -->
      <button class="close-btn animate-in delay-5" onclick="Telegram.WebApp.close()">
        ✅ تم — أغلق التطبيق
      </button>

    </div>
  </div>

</div>

<script>
  const tg = window.Telegram.WebApp;

  // تفعيل التطبيق وتوسيعه
  tg.ready();
  tg.expand();

  // مطابقة ثيم تيليجرام
  document.documentElement.style.setProperty(
    '--bg', tg.colorScheme === 'light' ? '#f5f6fa' : '#0a0c10'
  );

  // ============================================================
  // قراءة بيانات المستخدم من initDataUnsafe
  // ============================================================
  const user = tg.initDataUnsafe?.user;

  function showProfile(user) {
    document.getElementById('loading').style.display = 'none';

    const profile = document.getElementById('profile');
    profile.style.display = 'flex';

    if (!user) {
      document.getElementById('userName').textContent   = 'مجهول';
      document.getElementById('userHandle').textContent = '@unknown';
      document.getElementById('fullName').textContent   = 'غير متاح';
      document.getElementById('userId').textContent     = 'غير متاح';
      document.getElementById('userLang').textContent   = 'غير متاح';
      document.getElementById('avatarPlaceholder').textContent = '?';
      return;
    }

    // الاسم
    const firstName = user.first_name || '';
    const lastName  = user.last_name  || '';
    const fullName  = [firstName, lastName].filter(Boolean).join(' ');
    const username  = user.username ? `@${user.username}` : 'لا يوجد يوزرنيم';

    document.getElementById('userName').textContent   = firstName || 'مستخدم';
    document.getElementById('userHandle').textContent = username;
    document.getElementById('fullName').textContent   = fullName  || 'غير متاح';
    document.getElementById('userId').textContent     = user.id   || 'غير متاح';
    document.getElementById('userLang').textContent   = user.language_code?.toUpperCase() || 'غير متاح';

    // الصورة الشخصية
    if (user.photo_url) {
      const wrap = document.getElementById('avatarWrap');
      const placeholder = document.getElementById('avatarPlaceholder');

      const img = document.createElement('img');
      img.src = user.photo_url;
      img.className = 'avatar';
      img.alt = 'صورة الملف الشخصي';

      img.onload = () => {
        placeholder.replaceWith(img);
      };
      img.onerror = () => {
        // في حال فشل تحميل الصورة نعرض الحرف الأول
        placeholder.textContent = (firstName[0] || '?').toUpperCase();
      };
    } else {
      document.getElementById('avatarPlaceholder').textContent =
        (firstName[0] || '?').toUpperCase();
    }
  }

  // ============================================================
  // طلب رقم الهاتف
  // ============================================================
  function requestPhone() {
    const btn = document.getElementById('phoneBtn');

    // تحقق أن الميزة مدعومة (Bot API 6.9+)
    if (!tg.requestContact) {
      btn.textContent = '⚠️ غير مدعوم في هذا الإصدار';
      btn.disabled = true;
      return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ في الانتظار...';

    tg.requestContact((shared) => {
      if (shared) {
        // المستخدم شارك رقمه — نقرأه من contactRequested
        // الرقم يأتي عبر حدث contactRequested
        btn.style.display = 'none';
      } else {
        // رفض المشاركة
        btn.disabled = false;
        btn.textContent = '📱 مشاركة رقم الهاتف';

        // عرض رسالة مؤقتة
        const msg = document.createElement('div');
        msg.className = 'phone-cancelled';
        msg.textContent = '❌ لم تتم مشاركة الرقم';
        btn.parentNode.insertBefore(msg, btn.nextSibling);
        setTimeout(() => msg.remove(), 3000);
      }
    });
  }

  // استقبال الرقم بعد المشاركة
  tg.onEvent('contactRequested', (event) => {
    if (event.status === 'sent') {
      const contact = tg.initDataUnsafe?.contact;
      const phone = contact?.phone_number || 'تم التحقق ✓';

      document.getElementById('phoneRow').style.display  = 'flex';
      document.getElementById('phoneValue').textContent  = phone;
      document.getElementById('phoneBtn').style.display  = 'none';
    }
  });

  // محاكاة بيانات إذا كانت الصفحة تُفتح خارج تيليجرام (للتطوير)
  const isInsideTelegram = tg.initData && tg.initData.length > 0;

  if (isInsideTelegram) {
    showProfile(user);
  } else {
    // وضع التطوير — بيانات وهمية
    setTimeout(() => {
      showProfile({
        id: 123456789,
        first_name: 'تجريبي',
        last_name: 'مستخدم',
        username: 'testuser',
        language_code: 'ar',
        photo_url: null,
      });
    }, 800);
  }
</script>
</body>
</html>
